<nav class="fixed w-full z-50 transition-all duration-300 border-b" 
    [class.bg-base-100/90]="isScrolled || !isHomePage"
    [class.dark:bg-neutral/90]="isScrolled || !isHomePage" 
    [class.backdrop-blur-md]="isScrolled || !isHomePage"
    [class.border-base-content/10]="isScrolled || !isHomePage" 
    [class.bg-transparent]="!isScrolled && isHomePage"
    [class.border-transparent]="!isScrolled && isHomePage">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20 items-center">
            <div class="flex items-center h-full">
                <a class="flex h-full items-center gap-2 group cursor-pointer transition-all duration-500"
                    [class.opacity-0]="!(showLogo$ | async)" [class.opacity-100]="showLogo$ | async"
                    [class.-translate-x-4]="!(showLogo$ | async)" [class.translate-x-0]="showLogo$ | async"
                    [class.pointer-events-none]="!(showLogo$ | async)" [routerLink]="routes.home.fullPath"
                    (click)="scrollToTop()">
                    <div class="h-15">
                        <app-logo-icon [invertDark]="true"></app-logo-icon>
                    </div>
                    <app-logo variant="default" class="h-6" [invertDark]="true"></app-logo>
                </a>
            </div>
            <!-- Centro: Botões de Ofertas com Cores Diferenciadas -->
            <div class="hidden lg:flex items-center gap-1 px-2 py-1.5 bg-base-200/50 dark:bg-base-200/20 backdrop-blur-md rounded-full shadow-inner transition-all duration-500"
                [class.opacity-0]="!(showOffersSelector$ | async)" [class.opacity-100]="showOffersSelector$ | async"
                [class.scale-95]="!(showOffersSelector$ | async)" [class.scale-100]="showOffersSelector$ | async"
                [class.pointer-events-none]="!(showOffersSelector$ | async)">
                <app-selector variant="header"></app-selector>
            </div>

            <!-- Canto: Links Antigos e CTA -->
            <div class="hidden lg:flex space-x-6 items-center">
                <a class="text-sm text-base-content/80 hover:text-accent font-medium transition relative after:content-[''] after:absolute after:w-full after:scale-x-0 after:h-0.5 after:bottom-0 after:left-0 after:bg-accent after:origin-bottom-right after:transition-transform after:duration-300 hover:after:scale-x-100 hover:after:origin-bottom-left"
                    [class.text-primary]="!isScrolled && isHomePage" 
                    routerLinkActive="!text-accent font-bold after:scale-x-100 after:origin-bottom-left"
                    [routerLink]="routes.services.fullPath">Serviços</a>
                <a class="text-sm text-base-content/80 hover:text-accent font-medium transition relative after:content-[''] after:absolute after:w-full after:scale-x-0 after:h-0.5 after:bottom-0 after:left-0 after:bg-accent after:origin-bottom-right after:transition-transform after:duration-300 hover:after:scale-x-100 hover:after:origin-bottom-left"
                    [class.text-primary]="!isScrolled && isHomePage" 
                    routerLinkActive="!text-accent font-bold after:scale-x-100 after:origin-bottom-left"
                    [routerLink]="routes.about.fullPath">Sobre</a>
                <div class="relative group-theme">
                    <button
                        class="flex items-center text-base-content/80 hover:text-accent font-medium focus:outline-none transition-colors hover:cursor-pointer"
                        [class.text-primary]="!isScrolled && isHomePage" id="theme-toggle" (click)="toggleTheme()"
                        [attr.aria-label]="(isDark$ | async) ? 'Switch to light mode' : 'Switch to dark mode'">
                        <span class="material-symbols-outlined text-xl">{{ (isDark$ | async) ? 'light_mode' :
                            'dark_mode' }}</span>
                    </button>
                </div>
                <!-- Divisor Vertical -->
                <div class="w-px h-6 bg-base-content/10"></div>
                <!-- Botão Canto -->
                <a class="bg-primary hover:bg-accent text-primary-content dark:text-gray-200 px-6 py-2.5 rounded-full text-sm font-bold shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition duration-300 ease-out hover:cursor-pointer"
                    (click)="scrollToContact($event)">
                    Fale Conosco
                </a>
            </div>
            <div class="lg:hidden flex items-center gap-4">
                <button
                    class="flex items-center text-base-content hover:text-accent font-medium focus:outline-none transition-colors hover:cursor-pointer"
                    [class.text-primary]="!isScrolled && isHomePage"
                    (click)="toggleTheme()">
                    <span class="material-symbols-outlined">{{ (isDark$ | async) ? 'light_mode' : 'dark_mode' }}</span>
                </button>
                <button class="text-base-content hover:text-primary transition-colors" 
                    [class.text-primary]="!isScrolled && isHomePage"
                    (click)="toggleMenu()">
                    <span class="material-symbols-outlined text-3xl">{{ isMenuOpen ? 'close' : 'menu' }}</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div class="lg:hidden absolute top-20 right-0 w-full h-[calc(100vh-5rem)] transition-transform duration-300 ease-in-out bg-base-100/95 backdrop-blur-md border-l border-t border-base-content/10 shadow-2xl" 
        [class.translate-x-full]="!isMenuOpen"
        [class.translate-x-0]="isMenuOpen">
        <div class="px-6 py-8 h-full flex flex-col space-y-3 overflow-y-auto">
            <!-- Menu de Ofertas Mobile -->
            <div class="border-b border-base-content/10 pb-6 mb-4">
                <app-selector variant="mobile" (onSelect)="isMenuOpen = false"></app-selector>
            </div>

            <a class="flex items-center gap-3 px-4 py-4 text-lg font-medium text-base-content hover:text-accent hover:bg-base-200 rounded-xl transition"
                [routerLink]="routes.services.fullPath" routerLinkActive="!text-accent bg-base-200" (click)="isMenuOpen = false">
                <span class="material-symbols-outlined text-2xl">category</span> Serviços
            </a>
            <a class="flex items-center gap-3 px-4 py-4 text-lg font-medium text-base-content hover:text-accent hover:bg-base-200 rounded-xl transition"
                [routerLink]="routes.about.fullPath" routerLinkActive="!text-accent bg-base-200" (click)="isMenuOpen = false">
                <span class="material-symbols-outlined text-2xl">info</span> Sobre
            </a>
            <div class="mt-auto pt-6 flex-1 flex flex-col justify-end">
                <a class="block w-full text-center bg-primary hover:bg-accent text-primary-content dark:text-gray-200 px-6 py-4 rounded-xl font-bold shadow-lg transition hover:cursor-pointer"
                    (click)="scrollToContact($event)">
                    Fale Conosco
                </a>
            </div>
        </div>
    </div>
</nav>
